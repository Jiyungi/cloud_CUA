services:
  cloud-cua:
    build: .
    ports:
      - "127.0.0.1:${CLOUD_CUA_DOCKER_PORT:-3000}:3000"
    environment:
      CLOUD_CUA_DASHBOARD_PORT: "3000"
      CLOUD_CUA_PUBLIC_URL: "http://127.0.0.1:${CLOUD_CUA_DOCKER_PORT:-3000}"
      AWS_PROFILE: "${AWS_PROFILE:-cloud-cua-dev}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_CLOUD_PROJECT:-}"
      GOOGLE_CLOUD_REGION: "${GOOGLE_CLOUD_REGION:-us-central1}"
      CLOUD_CUA_CONTAINER: "1"
    volumes:
      - ${CLOUD_CUA_REPO_PATH:-.}:/workspace
      - cloud-cua-state:/root/.cloud-cua
      - ${USERPROFILE}/.cloud-cua/credentials.env:/root/.cloud-cua/credentials.env:ro
      - ${USERPROFILE}/.aws:/root/.aws:ro
      - ${USERPROFILE}/.config/gcloud:/root/.config/gcloud:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    command: ["python", "-m", "cloud_cua.container_runtime"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/health', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  cloud-cua-state:
