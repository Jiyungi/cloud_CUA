      - {id: dynamodb-recovery-cleanup, case_type: recovery_cleanup, title: Recover throttling and duplicate writes, objective: Diagnose hot partitions or capacity and replay duplicates using metrics and conditional writes before scaling blindly, setup: Tagged table shows throttles and duplicate audit items after retried events, task: Identify key skew and idempotency failure apply a bounded correction verify replay then clean backups and replicas, expected_outcome: recover, required_fact_keys: [table_name, throttled_operation, consumed_capacity, partition_key_distribution, idempotency_key, replica_regions], warning_ids: [hot_partition, duplicate_business_transition, blind_capacity_increase], forbidden_action_ids: [delete_duplicate_evidence, disable_condition_expression, add_unapproved_replica], required_evidence_keys: [throttle_metrics, key_distribution_summary, conditional_replay_test, duplicate_count_after_fix], cleanup_evidence_keys: [replicas_removed, backups_disposition, table_deleted], skill_rules: [Throttling can be data-model skew not capacity shortage, Replays must be proven idempotent, Global-table cleanup starts with replicas]}

