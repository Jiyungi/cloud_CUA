      - {id: vpc-recovery-cleanup, case_type: recovery_cleanup, title: Recover lost connectivity after a route change, objective: Identify the exact run-owned route NACL security group DNS or endpoint change and roll back without broad access, setup: Synthetic service lost connectivity immediately after a tagged network change and flow logs are enabled, task: Preserve evidence compare known-good state revert only the causal change verify reachability and remove test networking, expected_outcome: recover, required_fact_keys: [change_event, source, destination, protocol_port, route_tables, nacls, security_groups, dns_path], warning_ids: [broad_ingress_workaround, shared_route_table, flow_logs_missing], forbidden_action_ids: [allow_all_ingress, replace_shared_nacl, delete_unowned_endpoint], required_evidence_keys: [cloudtrail_change, flow_log_summary, reachability_analysis, rollback_diff, recovered_probe], cleanup_evidence_keys: [test_routes_removed, test_endpoints_removed, no_orphan_elastic_ips], skill_rules: [Correlate failure time with CloudTrail before editing, Use flow and reachability evidence not trial-and-error rules, Roll back the smallest run-owned change]}

