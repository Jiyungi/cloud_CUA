name: cloud-cua/aws-amplify
description: Deploy a static build through Amplify Hosting's manual Amazon S3 source using a contract and staged artifact.
target: aws_amplify
autonomy_level: 1
source: https://github.com/Jiyungi/cloud_CUA
url_pattern: https://console\.aws\.amazon\.com/amplify/.*
required_facts:
- resource_name
- branch_name
- build_command
- output_directory
- artifact_reference
- aws_region
- expected_account_id
- cloud_cua_run_tag
- app_id
- app_root
- branch
- deployed_commit
- detected_framework
- environment_variables
- health_endpoint
- install_command
- lockfile_path
- node_version
- public_env_names
- repository
- requested_app_root
- requested_branch
- rewrite_rules
- selected_app_root
- selected_branch
unknowns_that_block:
- Build command or output directory is unknown.
- The staged S3 artifact cannot be selected through Deploy without Git.
- 'Required fact is missing or unverified: app_id'
- 'Required fact is missing or unverified: app_root'
- 'Required fact is missing or unverified: branch'
- 'Required fact is missing or unverified: build_command'
- 'Required fact is missing or unverified: deployed_commit'
- 'Required fact is missing or unverified: detected_framework'
- 'Required fact is missing or unverified: environment_variables'
- 'Required fact is missing or unverified: health_endpoint'
- 'Required fact is missing or unverified: install_command'
- 'Required fact is missing or unverified: lockfile_path'
- 'Required fact is missing or unverified: node_version'
- 'Required fact is missing or unverified: output_directory'
- 'Required fact is missing or unverified: public_env_names'
- 'Required fact is missing or unverified: repository'
- 'Required fact is missing or unverified: requested_app_root'
- 'Required fact is missing or unverified: requested_branch'
- 'Required fact is missing or unverified: rewrite_rules'
- 'Required fact is missing or unverified: selected_app_root'
- 'Required fact is missing or unverified: selected_branch'
h_cua_allowed_actions:
- Inspect Amplify Hosting setup forms.
- Report required app, branch, S3 artifact, build, and domain inputs.
- Create an Amplify app only after approval and only when the contract is complete.
- Inspect AWS Amplify Hosting console state without mutation.
- Compare every visible selection with the approved run contract.
- Perform only the bounded, approved service action after required facts are verified.
- Return structured resource, verifier, blocker, and cleanup evidence.
h_cua_stop_conditions:
- GitHub OAuth, account linking, secrets, or an unexpected pricing choice is required.
- Build settings differ from the contract.
- Monorepo app root branch and output directory must be exact
- VITE-prefixed variables are public browser values
- Repository OAuth and domain changes require explicit approval
required_verifiers:
- aws_identity
- aws_tagged_run_resources
- aws_amplify_app_contract
- public_app_url
- http_live_url
- playwright_render
- app_deleted
- app_id
- app_root_evidence
- authenticated_health
- blocker_report
- branch_arn
- branch_deleted
- branch_diff
- build_contract
- build_log
- configuration_diff
- deep_link_test
- deployed_commit
- domain_disconnected
- env_classification
- failure_phase
- health_test
- no_amplify_app_created
- root_diff
- successful_build
success_conditions:
- The exact run-tagged Amplify app and branch exist.
- The deployed URL passes HTTP and browser rendering checks.
- Connect approved repository and branch set monorepo root build command dist output public config redirects and verify authenticated
  health
- Block deployment when branch defaults main app root is repository root or secret is placed in public Vite variable
- Diagnose branch root lockfile runtime build output env and rewrites without changing application contract
cleanup_strategy: Delete only the run-tagged Amplify app after explicit cleanup approval.
body: '# Deploy with AWS Amplify Hosting


  Use the Cloud CUA contract as the source of truth. Use Deploy without Git and the exact staged Amazon S3 zip reference.
  Select the source with the AWS Browse S3 picker: choose the contract''s bucket, choose its zip object, and confirm the selection.
  Do not type or paste the s3:// URI into the location field. Inspect first and report app name, branch, source method, build
  artifact, domain choice, and price-impacting choices.


  Do not connect GitHub, reveal secrets, change billing, or create resources until the prompt confirms approval. Prepare the
  form without submitting, then submit exactly once only after the supervisor checkpoint. Report structured evidence with
  the app ID, branch, deployment status, public app URL, console URL, tags, and blockers. Independent verifiers decide success.


  ## Evaluation-derived service rules


  Use the run contract as the source of truth. Inspect before mutation and stop when a required fact is unknown.

  A console success label is not proof; independent service, workload, and cleanup evidence decide success.


  Required sequence:

  1. Confirm account, region, ownership tags, cost boundary, and service-specific facts.

  2. Inspect defaults and report mismatches before editing anything.

  3. Mutate only after approval and only within the exact run-owned resource boundary.

  4. Stop on new IAM, public exposure, destructive, cross-account, secret, or billing decisions.

  5. Return structured evidence and verify cleanup dependencies before declaring completion.


  Service rules:

  - Use exact child root and requested branch

  - Browser-prefixed env is public

  - Health proof precedes connected status

  - Hard-coded main is a blocker

  - Analyze exact child path

  - Reject secret-bearing VITE variables

  - Build logs identify phase not permission to change branch

  - Use the AWS extension-excluding SPA fallback rule; a broad /<*> rewrite can return index.html for JavaScript and CSS assets

  - Verify deployed commit


  Evaluation scenarios:

  - amplify-guided-provision: Connect approved repository and branch set monorepo root build command dist output public config
  redirects and verify authenticated health

  - amplify-misconfiguration-trap: Block deployment when branch defaults main app root is repository root or secret is placed
  in public Vite variable

  - amplify-recovery-cleanup: Diagnose branch root lockfile runtime build output env and rewrites without changing application
  contract

  '
