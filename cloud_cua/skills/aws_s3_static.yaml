name: cloud-cua/aws-s3-static
description: Safely create a tagged S3 static website from a prepared local build artifact.
target: aws_s3_static_site
autonomy_level: 2
required_facts:
  - run_id
  - aws_region
  - expected_account_id
  - resource_name
  - cloud_cua_run_tag
unknowns_that_block:
  - bucket name or region is missing
  - the named bucket already exists without every required tag for this exact run
  - build output lacks index.html
h_cua_allowed_actions:
  - inspect the S3 console and account identity
  - create only the contract-named bucket
  - configure static website hosting and minimum public object read
  - add the exact Cloud CUA tags
h_cua_stop_conditions:
  - an existing bucket would be modified
  - AWS shows account, region, IAM, billing, or validation mismatch
  - CloudFront, Route 53, custom domain, versioning, or replication is required
required_verifiers:
  - aws_identity
  - aws_s3_static_run
  - http_live_url
  - playwright_render
  - cleanup_discovery
success_conditions:
  - exact run-tagged bucket exists
  - website index is index.html
  - uploaded live URL returns the app
cleanup_strategy: Empty and delete only the exact run-tagged bucket.
body: |
  # AWS S3 Static Website

  Follow the run contract exactly. Never choose a bucket name, account, region, policy scope, or optional AWS feature that is not in the contract.

  Work only through the bounded milestone in the current task. The bucket-preparation milestone creates or reuses only the exact bucket and proves every required run tag. The website milestone configures only website hosting and the bucket-scoped public object-read policy. Stop on an existing bucket unless every required tag proves it belongs to this exact run. Skip CloudFront, domains, logging, replication, versioning, and non-standard storage.

  Report structured evidence. Never call an AWS Console URL the deployed application URL.
