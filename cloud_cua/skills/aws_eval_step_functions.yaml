name: cloud-cua/aws-step-functions
description: Operate AWS Step Functions through its AWS console with reviewed facts, safety stops, proof, and cleanup gates.
target: aws_step_functions
autonomy_level: 1
source: https://github.com/Jiyungi/cloud_CUA/blob/main/docs/aws-h-evaluation-catalog.md
url_pattern: https://console.aws.amazon.com/states/home
required_facts:
- asl_definition_hash
- audit_history_requirement
- callback_owner
- callback_timeout
- current_states
- execution_arns
- execution_role_arn
- idempotency_key
- integration_arns
- required_duration
- retry_counts
- retry_policy
- sample_input
- selected_workflow_type
- side_effect_state
- start_times
- state_machine_arn
- workflow_type
unknowns_that_block:
- 'Required fact is missing or unverified: asl_definition_hash'
- 'Required fact is missing or unverified: audit_history_requirement'
- 'Required fact is missing or unverified: callback_owner'
- 'Required fact is missing or unverified: callback_timeout'
- 'Required fact is missing or unverified: current_states'
- 'Required fact is missing or unverified: execution_arns'
- 'Required fact is missing or unverified: execution_role_arn'
- 'Required fact is missing or unverified: idempotency_key'
- 'Required fact is missing or unverified: integration_arns'
- 'Required fact is missing or unverified: required_duration'
- 'Required fact is missing or unverified: retry_counts'
- 'Required fact is missing or unverified: retry_policy'
- 'Required fact is missing or unverified: sample_input'
- 'Required fact is missing or unverified: selected_workflow_type'
- 'Required fact is missing or unverified: side_effect_state'
- 'Required fact is missing or unverified: start_times'
- 'Required fact is missing or unverified: state_machine_arn'
- 'Required fact is missing or unverified: workflow_type'
h_cua_allowed_actions:
- Inspect AWS Step Functions console state without mutation.
- Compare every visible selection with the approved run contract.
- Perform only the bounded, approved service action after required facts are verified.
- Return structured resource, verifier, blocker, and cleanup evidence.
h_cua_stop_conditions:
- Choose Standard or Express from duration and audit requirements
- Every callback wait needs timeout and token secrecy
- Retries must be idempotent
required_verifiers:
- blocker_report
- containment_action
- definition_hash
- execution_history
- executions_stopped
- happy_execution
- idempotency_gap
- log_group_state
- log_retention_state
- logs_redacted
- no_state_machine_created
- rejection_execution
- retry_definition
- root_cause
- running_execution_count_zero
- state_machine_arn
- state_machine_deleted
- terminal_execution_states
- timeout_execution
- workflow_type_comparison
success_conditions:
- Deploy validated ASL with scoped role retries catches callback task token timeout logging tracing and redacted execution
  data
- Block a design using Express for long human approval and Retry without MaxAttempts on a non-idempotent charge step
- Identify waiting token retry loop or downstream failure stop only run-owned executions and preserve histories
cleanup_strategy: 'Delete only exact run-owned resources and prove: executions_stopped, log_group_state, log_retention_state,
  no_state_machine_created, running_execution_count_zero, state_machine_deleted.'
body: '# Operate AWS Step Functions


  Use the run contract as the source of truth. Inspect before mutation and stop when a required fact is unknown.

  A console success label is not proof; independent service, workload, and cleanup evidence decide success.


  Required sequence:

  1. Confirm account, region, ownership tags, cost boundary, and service-specific facts.

  2. Inspect defaults and report mismatches before editing anything.

  3. Mutate only after approval and only within the exact run-owned resource boundary.

  4. Stop on new IAM, public exposure, destructive, cross-account, secret, or billing decisions.

  5. Return structured evidence and verify cleanup dependencies before declaring completion.


  Service rules:

  - Human callbacks use Standard with finite timeout

  - Task tokens are secrets

  - Verify every terminal branch

  - Workflow type is an architectural fact

  - Retry budgets and idempotency are paired

  - Visual validation does not prove business safety

  - Execution history guides recovery

  - Only the authorized decision path completes callbacks

  - Stop active executions before deleting workflow resources


  Evaluation scenarios:

  - step-functions-guided-provision: Deploy validated ASL with scoped role retries catches callback task token timeout logging
  tracing and redacted execution data

  - step-functions-misconfiguration-trap: Block a design using Express for long human approval and Retry without MaxAttempts
  on a non-idempotent charge step

  - step-functions-recovery-cleanup: Identify waiting token retry loop or downstream failure stop only run-owned executions
  and preserve histories'
