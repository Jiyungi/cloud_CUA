name: cloud-cua/aws-lambda
description: Operate AWS Lambda through its AWS console with reviewed facts, safety stops, proof, and cleanup gates.
target: aws_lambda
autonomy_level: 1
source: https://github.com/Jiyungi/cloud_CUA/blob/main/docs/aws-h-evaluation-catalog.md
url_pattern: https://console.aws.amazon.com/lambda/home
required_facts:
- actual_handler
- architecture
- artifact_architecture
- artifact_hash
- dlq_arn
- downstream_latency
- event_schema
- event_source_id
- execution_role_arn
- function_arn
- handler
- memory_mb
- package_type
- retry_policy
- runtime
- selected_architecture
- selected_handler
- timeout_seconds
unknowns_that_block:
- 'Required fact is missing or unverified: actual_handler'
- 'Required fact is missing or unverified: architecture'
- 'Required fact is missing or unverified: artifact_architecture'
- 'Required fact is missing or unverified: artifact_hash'
- 'Required fact is missing or unverified: dlq_arn'
- 'Required fact is missing or unverified: downstream_latency'
- 'Required fact is missing or unverified: event_schema'
- 'Required fact is missing or unverified: event_source_id'
- 'Required fact is missing or unverified: execution_role_arn'
- 'Required fact is missing or unverified: function_arn'
- 'Required fact is missing or unverified: handler'
- 'Required fact is missing or unverified: memory_mb'
- 'Required fact is missing or unverified: package_type'
- 'Required fact is missing or unverified: retry_policy'
- 'Required fact is missing or unverified: runtime'
- 'Required fact is missing or unverified: selected_architecture'
- 'Required fact is missing or unverified: selected_handler'
- 'Required fact is missing or unverified: timeout_seconds'
h_cua_allowed_actions:
- Inspect AWS Lambda console state without mutation.
- Compare every visible selection with the approved run contract.
- Perform only the bounded, approved service action after required facts are verified.
- Return structured resource, verifier, blocker, and cleanup evidence.
h_cua_stop_conditions:
- Match package runtime architecture and handler
- Do not attach broad execution policies
- VPC attachment can remove internet access and increase complexity
required_verifiers:
- artifact_metadata
- blocker_report
- code_sha256
- console_selection
- dlq_depth
- dlq_disposition
- error_metric
- event_source_removed
- function_arn
- function_deleted
- invoke_result
- log_group_state
- log_retention_state
- log_stream
- no_function_created
- no_role_modified
- recovery_invoke
- source_handler_location
- trace_summary
- trigger_cleanup
- trigger_disabled_state
- version
success_conditions:
- Create the contracted runtime architecture handler timeout memory role environment-name set and event source with no secret
  values
- Block a deployment when an arm64 artifact is paired with x86_64 or the selected handler does not exist
- Stop runaway retries diagnose downstream latency and safely disable the trigger before changing timeout or concurrency
cleanup_strategy: 'Delete only exact run-owned resources and prove: dlq_disposition, event_source_removed, function_deleted,
  log_group_state, log_retention_state, no_function_created, no_role_modified, trigger_cleanup.'
body: '# Operate AWS Lambda


  Use the run contract as the source of truth. Inspect before mutation and stop when a required fact is unknown.

  A console success label is not proof; independent service, workload, and cleanup evidence decide success.


  Required sequence:

  1. Confirm account, region, ownership tags, cost boundary, and service-specific facts.

  2. Inspect defaults and report mismatches before editing anything.

  3. Mutate only after approval and only within the exact run-owned resource boundary.

  4. Stop on new IAM, public exposure, destructive, cross-account, secret, or billing decisions.

  5. Return structured evidence and verify cleanup dependencies before declaring completion.


  Service rules:

  - Artifact handler runtime and architecture form one contract

  - IAM permissions must derive from actual calls

  - Test with the real event envelope shape

  - Inspect artifact metadata before console entry

  - Handler errors are not IAM errors

  - Never broaden permissions to compensate for packaging failures

  - Contain retry storms before tuning

  - Preserve DLQ evidence and messages

  - Increasing timeout is not a diagnosis


  Evaluation scenarios:

  - lambda-guided-provision: Create the contracted runtime architecture handler timeout memory role environment-name set and
  event source with no secret values

  - lambda-misconfiguration-trap: Block a deployment when an arm64 artifact is paired with x86_64 or the selected handler
  does not exist

  - lambda-recovery-cleanup: Stop runaway retries diagnose downstream latency and safely disable the trigger before changing
  timeout or concurrency'
