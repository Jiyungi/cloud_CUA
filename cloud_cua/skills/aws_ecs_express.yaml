name: cloud-cua/aws-ecs-express
description: Use for deploying a containerized web application through Amazon ECS Express Mode when Cloud CUA provides a run contract and approval state.
target: aws_ecs_express
autonomy_level: 2
source: https://github.com/Jiyungi/cloud_CUA
url_pattern: "https://console\\.aws\\.amazon\\.com/ecs/.*"
required_facts:
  - container_image_uri
  - selected_container_port
  - health_check_path
  - aws_region
  - cloud_cua_run_tag
unknowns_that_block:
  - The application container port is unknown or ambiguous.
  - The prepared image URI is missing.
  - The AWS form cannot accept the contracted port, region, image, health path, tags, or service type.
h_cua_allowed_actions:
  - Inspect ECS Express Mode forms without changing cloud resources.
  - Fill a deployment form only with values from the contract.
  - Create the service only after the prompt states that user approval is granted.
  - Observe deployment status and report visible resource identifiers and application URLs.
h_cua_stop_conditions:
  - Login, MFA, captcha, OAuth, secrets, or account linking requires the user.
  - A required value is absent from the contract.
  - A contracted value cannot be entered or selected, or an unapproved IAM or price choice is required.
  - AWS reports failed health checks, no running tasks, AccessDenied, or an unexpected paid option.
required_verifiers:
  - aws_identity
  - aws_tagged_run_resources
  - aws_ecs_contract
  - public_app_url
  - http_live_url
  - playwright_render
  - cleanup_discovery
success_conditions:
  - The exact run-tagged ECS service exists.
  - Its task definition uses the prepared image and contracted container port.
  - Desired tasks are running and load balancer targets are healthy.
  - A non-console public application URL passes HTTP and browser rendering checks.
cleanup_strategy: Delete only resources carrying both cloud-cua=true and the exact cloud-cua-run tag.
body: |
  # Deploy with Amazon ECS Express Mode

  Treat the Cloud CUA run contract as the source of truth. Never infer a container port, image URI, region, health path, tag, or IAM choice when the contract omits it.

  Work in milestones:

  1. Inspect the ECS Express form without changing resources. Report the visible service type, region, image field, port default, health path default, tags, IAM choices, and estimated cost.
  2. Report editable defaults that differ from the contract as required corrections. Stop only if a required fact is missing or the form cannot accept the contracted value.
  3. After explicit approval, prepare the form without submitting it. Use write actions with enter=false. Never press Enter in a form field. Fill the exact image, port, health path, and tags; leave optional task role and networking controls unchanged unless the contract specifies them.
  4. Report the prepared field values for supervisor comparison. Do not click Create until a later submit-only milestone.
  5. During the submit-only milestone, re-check the prepared values, click Create exactly once, then observe until AWS shows a stable success, failure, or user-action blocker. Do not call provisioning or an Active label proof that the app works.
  6. Return structured JSON with milestone, status, region, service name and ARN, task definition, image URI, container port, target health, public app URL, console URL, created resources, blockers, and assumptions.

  A console URL is never a public application URL. H observations are evidence for the supervisor, not final proof; independent verifiers decide whether the run succeeded.
